<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Reveal</title>  <style>
    :root {
      --gold: #f8d878;
      --gold-soft: #fff3bd;
      --gold-deep: #b97718;
      --dark: #050301;
      --paper: #f4ddb0;
      --ink: #2d1705;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--dark);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050301;
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      transform: scale(1.04);
      filter: blur(16px);
      transition: opacity 1s ease, transform 1.2s ease, filter 1s ease, visibility 1s;
      overflow: hidden;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
      filter: blur(0);
      z-index: 5;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.05);
      transition: transform 2.4s cubic-bezier(.2,.8,.2,1), filter 1s ease;
      z-index: 0;
    }

    .screen.active .bg-image {
      transform: scale(1);
    }

    .cinematic-grade {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 42%, transparent 0%, rgba(0,0,0,0.06) 38%, rgba(0,0,0,0.52) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.08), transparent 28%, rgba(0,0,0,0.48));
    }

    .gold-bloom {
      position: absolute;
      inset: -20%;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 36% 27%, rgba(255, 224, 133, 0.48), transparent 18%),
        radial-gradient(circle at 50% 56%, rgba(255, 192, 67, 0.18), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(255, 247, 202, 0.14), transparent 22%);
      filter: blur(18px);
      animation: bloomDrift 9s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    @keyframes bloomDrift {
      from { transform: translate3d(-1%, -1%, 0) scale(1); opacity: 0.72; }
      to { transform: translate3d(1%, 1.5%, 0) scale(1.04); opacity: 1; }
    }

    .film-noise {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: soft-light;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.8'/%3E%3C/svg%3E");
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 232, 151, 0.95);
      box-shadow: 0 0 14px rgba(255, 220, 124, 0.9);
      animation: particleRise linear infinite;
    }

    @keyframes particleRise {
      from { transform: translateY(105vh) scale(0.5); opacity: 0; }
      18% { opacity: 1; }
      82% { opacity: 1; }
      to { transform: translateY(-12vh) scale(1.1); opacity: 0; }
    }

    .door-hotspot {
      position: absolute;
      left: 50%;
      top: 54%;
      transform: translate(-50%, -50%);
      z-index: 8;
      width: min(24vw, 190px);
      height: min(24vw, 190px);
      border-radius: 50%;
      cursor: pointer;
      background: radial-gradient(circle, rgba(255, 226, 132, 0.33), rgba(255, 221, 120, 0.08) 46%, transparent 70%);
      border: 1px solid rgba(255, 230, 156, 0.2);
      box-shadow: 0 0 48px rgba(255, 214, 101, 0.32);
      animation: hotspotPulse 1.9s ease-in-out infinite;
    }

    @keyframes hotspotPulse {
      0%,100% { opacity: 0.72; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    .castle-screen.opening .bg-image {
      transform: scale(1.2);
      filter: brightness(1.18) saturate(1.18);
    }

    .castle-screen.opening .door-hotspot {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .white-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,244,201,0.96), rgba(255,212,105,0.38), transparent 68%);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }

    .castle-screen.opening .white-flash {
      animation: flashOpen 1.1s ease forwards;
    }

    @keyframes flashOpen {
      0% { opacity: 0; transform: scale(0.65); }
      42% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.25); }
    }

    .envelope-scene .bg-image {
      filter: saturate(1.08) contrast(1.04);
    }

    .envelope-click-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      cursor: pointer;
    }

    .envelope-pulse {
      position: absolute;
      left: 50%;
      top: 43%;
      transform: translate(-50%, -50%);
      z-index: 7;
      width: min(34vw, 280px);
      height: min(22vw, 190px);
      border-radius: 32px;
      background: radial-gradient(ellipse, rgba(255, 233, 162, 0.24), rgba(255, 217, 111, 0.08) 42%, transparent 72%);
      border: 1px solid rgba(255, 231, 162, 0.18);
      box-shadow: 0 0 62px rgba(255, 217, 111, 0.24);
      animation: envelopePulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes envelopePulse {
      0%,100% { opacity: 0.62; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    }

    .trail-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background:
        radial-gradient(circle at 31% 75%, rgba(255,255,255,0.5) 0 2px, transparent 3px),
        radial-gradient(circle at 36% 70%, rgba(255,231,154,0.68) 0 2px, transparent 3px),
        radial-gradient(circle at 42% 65%, rgba(255,240,188,0.75) 0 2px, transparent 3px),
        radial-gradient(circle at 48% 60%, rgba(255,231,154,0.8) 0 2px, transparent 3px),
        radial-gradient(circle at 54% 55%, rgba(255,255,255,0.55) 0 2px, transparent 3px);
      filter: drop-shadow(0 0 10px rgba(255,225,142,0.84));
      opacity: 0.75;
      animation: trailGlow 2.2s ease-in-out infinite;
    }

    @keyframes trailGlow {
      0%,100% { opacity: 0.46; filter: drop-shadow(0 0 7px rgba(255,225,142,0.55)); }
      50% { opacity: 0.95; filter: drop-shadow(0 0 18px rgba(255,225,142,0.95)); }
    }

    .sheet-screen {
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 226, 147, 0.30), transparent 34%),
        linear-gradient(135deg, #060301, #1a0d04 52%, #050201);
      overflow-y: auto;
      display: grid;
      place-items: center;
      padding: 34px 16px;
    }

    .vintage-sheet {
      position: relative;
      z-index: 8;
      width: min(94vw, 620px);
      padding: 42px 30px 36px;
      border-radius: 30px;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,0.54), transparent 21%),
        radial-gradient(circle at 84% 92%, rgba(113,64,9,0.14), transparent 26%),
        linear-gradient(145deg, #fff5cf 0%, #e8c57b 36%, #f8e5b0 58%, #b87922 100%);
      border: 1px solid rgba(255, 244, 203, 0.75);
      box-shadow: 0 44px 120px rgba(0,0,0,0.72), inset 0 0 90px rgba(85,47,6,0.16);
      animation: sheetReveal 1s cubic-bezier(.2,.9,.2,1) both;
      overflow: hidden;
    }

    @keyframes sheetReveal {
      from { opacity: 0; transform: translateY(52px) scale(0.94) rotateX(8deg); }
      to { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
    }

    .vintage-sheet::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(73, 39, 5, 0.28);
      border-radius: 22px;
      pointer-events: none;
      z-index: 1;
    }

    .vintage-sheet::after {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.17;
      pointer-events: none;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.035' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.42'/%3E%3C/svg%3E");
    }

    .sheet-glow {
      position: absolute;
      left: 50%;
      top: 0;
      width: 70%;
      height: 170px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(255,255,255,0.42), transparent 68%);
      filter: blur(14px);
      z-index: 1;
      pointer-events: none;
    }

    .card-frame {
      position: relative;
      z-index: 2;
      width: min(100%, 450px);
      margin: 0 auto;
      padding: 12px;
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(65,35,5,0.35), rgba(255,255,255,0.35));
      border: 1px solid rgba(64, 35, 5, 0.18);
      box-shadow: 0 24px 68px rgba(75, 43, 8, 0.28), inset 0 1px 0 rgba(255,255,255,0.28);
    }

    .scratch-card {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      border-radius: 23px;
      overflow: hidden;
      background: #111;
      touch-action: none;
      transform: scale(1);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .scratch-card.scratching {
      transform: scale(1.01);
      box-shadow: 0 0 52px rgba(123, 75, 7, 0.36);
    }

    .scratch-card.revealed {
      animation: revealPop 0.75s ease forwards;
    }

    @keyframes revealPop {
      0% { transform: scale(1.012); }
      45% { transform: scale(1.045) rotate(-0.35deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .reward-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
      transform: scale(1.04);
      transition: transform 1s ease, filter 1s ease;
      filter: saturate(1.08) contrast(1.04);
    }

    .scratch-card.revealed .reward-image {
      transform: scale(1);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
      transition: opacity 0.75s ease;
    }

    canvas.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .scratch-glow {
      position: absolute;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 234, 168, 0.38), rgba(255, 207, 92, 0.13) 34%, transparent 68%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
      mix-blend-mode: screen;
    }

    .scratch-card.scratching .scratch-glow { opacity: 1; }

    .shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0%, transparent 30%, rgba(255,255,255,0.34) 43%, rgba(255,226,143,0.34) 50%, transparent 62%, transparent 100%);
      transform: translateX(-120%);
      pointer-events: none;
      animation: shineMove 2.3s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes shineMove {
      0% { transform: translateX(-120%); }
      58%, 100% { transform: translateX(120%); }
    }

    .confetti-piece {
      position: fixed;
      top: -20px;
      width: 9px;
      height: 14px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 2.8s ease-out forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 700px) {
      .door-hotspot {
        top: 53%;
        width: 150px;
        height: 150px;
      }

      .envelope-pulse {
        width: 220px;
        height: 150px;
      }

      .vintage-sheet {
        padding: 28px 14px 24px;
        border-radius: 24px;
      }

      .card-frame {
        padding: 9px;
        border-radius: 25px;
      }

      .scratch-card {
        border-radius: 19px;
      }
    }
  </style></head>
<body>
  <main class="page">
    <div class="film-noise"></div><section class="screen castle-screen active" id="castleScreen">
  <img class="bg-image" src="castle-bg.jpg" alt="" />
  <div class="cinematic-grade"></div>
  <div class="gold-bloom"></div>
  <div class="particles" id="castleParticles"></div>
  <button class="door-hotspot" id="castleDoor" aria-label="Open castle door"></button>
  <div class="white-flash"></div>
</section>

<section class="screen envelope-scene" id="envelopeScreen">
  <img class="bg-image" src="envelope-bg.jpg" alt="" />
  <div class="cinematic-grade"></div>
  <div class="gold-bloom"></div>
  <div class="trail-overlay"></div>
  <div class="particles" id="envelopeParticles"></div>
  <div class="envelope-pulse"></div>
  <button class="envelope-click-layer" id="envelopeWrap" aria-label="Open envelope"></button>
</section>

<section class="screen sheet-screen" id="sheetScreen">
  <div class="particles" id="sheetParticles"></div>
  <div class="vintage-sheet">
    <div class="sheet-glow"></div>
    <div class="card-frame">
      <section class="scratch-card" id="scratchCard">
        <img class="reward-image" src="reward.png" alt="" />
        <canvas id="scratchCanvas"></canvas>
        <div class="scratch-glow" id="scratchGlow"></div>
        <div class="shine" id="shine"></div>
      </section>
    </div>
  </div>
</section>

  </main>  <script>
    const castleScreen = document.getElementById('castleScreen');
    const envelopeScreen = document.getElementById('envelopeScreen');
    const sheetScreen = document.getElementById('sheetScreen');
    const castleDoor = document.getElementById('castleDoor');
    const envelopeWrap = document.getElementById('envelopeWrap');

    const card = document.getElementById('scratchCard');
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const shine = document.getElementById('shine');
    const scratchGlow = document.getElementById('scratchGlow');

    let isDrawing = false;
    let scratchedOnce = false;
    let lastPoint = null;
    let revealStarted = false;
    let strokeDistance = 0;
    let completedStrokes = 0;

    function showScreen(screen) {
      [castleScreen, envelopeScreen, sheetScreen].forEach(item => item.classList.remove('active'));
      screen.classList.add('active');
    }

    function createParticles(containerId, count) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('span');
        particle.className = 'particle';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDuration = `${5 + Math.random() * 7}s`;
        particle.style.animationDelay = `${Math.random() * 6}s`;
        particle.style.opacity = `${0.35 + Math.random() * 0.65}`;
        particle.style.transform = `scale(${0.45 + Math.random() * 1.1})`;
        container.appendChild(particle);
      }
    }

    createParticles('castleParticles', 52);
    createParticles('envelopeParticles', 44);
    createParticles('sheetParticles', 34);

    castleDoor.addEventListener('click', () => {
      castleScreen.classList.add('opening');
      setTimeout(() => showScreen(envelopeScreen), 1050);
    });

    envelopeWrap.addEventListener('click', () => {
      showScreen(sheetScreen);
      setTimeout(setupCanvas, 160);
    });

    function setupCanvas() {
      const rect = card.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      drawScratchLayer(rect.width, rect.height);
    }

    function drawScratchLayer(width, height) {
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, '#fff8c9');
      gradient.addColorStop(0.16, '#9b5d0d');
      gradient.addColorStop(0.34, '#d69a2e');
      gradient.addColorStop(0.52, '#fff1a8');
      gradient.addColorStop(0.7, '#8c4f08');
      gradient.addColorStop(1, '#f6c95b');

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      const radial = ctx.createRadialGradient(width * 0.5, height * 0.34, 10, width * 0.5, height * 0.5, width * 0.75);
      radial.addColorStop(0, 'rgba(255,255,255,0.26)');
      radial.addColorStop(0.48, 'rgba(255,255,255,0.04)');
      radial.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = radial;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
      for (let i = 0; i < 260; i++) {
        ctx.beginPath();
        ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1;
      for (let i = -height; i < width; i += 24) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i + height, height);
        ctx.stroke();
      }
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
      };
    }

    function eraseCircle(x, y) {
      const brushSize = Math.max(46, canvas.offsetWidth * 0.095);

      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, brushSize, 0, Math.PI * 2);
      ctx.fill();

      scratchGlow.style.left = `${x}px`;
      scratchGlow.style.top = `${y}px`;
    }

    function eraseSmoothLine(from, to) {
      const distance = Math.hypot(to.x - from.x, to.y - from.y);
      const steps = Math.max(1, Math.ceil(distance / 8));

      for (let i = 0; i <= steps; i++) {
        const x = from.x + ((to.x - from.x) * i) / steps;
        const y = from.y + ((to.y - from.y) * i) / steps;
        eraseCircle(x, y);
      }
    }

    function scratch(event) {
      if (!isDrawing || revealStarted) return;

      const point = getPointerPosition(event);

      if (lastPoint) {
        const moveDistance = Math.hypot(point.x - lastPoint.x, point.y - lastPoint.y);
        strokeDistance += moveDistance;
        eraseSmoothLine(lastPoint, point);
      } else {
        eraseCircle(point.x, point.y);
      }

      lastPoint = point;

      if (!scratchedOnce) {
        scratchedOnce = true;
        shine.style.display = 'none';
      }
    }

    function createConfetti() {
      const colors = ['#ffcf6b', '#ffffff', '#ffe8a3', '#b87918', '#fff7cf'];

      for (let i = 0; i < 110; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 0.75}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3800);
      }
    }

    function autoReveal() {
      if (revealStarted) return;

      revealStarted = true;
      canvas.classList.add('fade-out');
      card.classList.add('revealed');
      createConfetti();

      setTimeout(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 520);
    }

    canvas.addEventListener('pointerdown', (event) => {
      isDrawing = true;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.add('scratching');
      canvas.setPointerCapture(event.pointerId);
      scratch(event);
    });

    canvas.addEventListener('pointermove', scratch);

    canvas.addEventListener('pointerup', () => {
      if (strokeDistance > canvas.offsetWidth * 0.22) completedStrokes++;
      if (completedStrokes >= 6) autoReveal();
      isDrawing = false;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.remove('scratching');
    });

    canvas.addEventListener('pointercancel', () => {
      isDrawing = false;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.remove('scratching');
    });

    window.addEventListener('resize', () => {
      if (!revealStarted && sheetScreen.classList.contains('active')) setupCanvas();
    });
  </script></body>
</html>
