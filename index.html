<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Reveal</title>  <style>
    :root {
      --gold: #f8d878;
      --gold-soft: #fff3bd;
      --gold-deep: #b97718;
      --dark: #050301;
      --paper: #f4ddb0;
      --ink: #2d1705;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--dark);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050301;
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      transform: scale(1.04);
      filter: blur(16px);
      transition: opacity 1s ease, transform 1.2s ease, filter 1s ease, visibility 1s;
      overflow: hidden;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
      filter: blur(0);
      z-index: 5;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: scale(1.01);
      image-rendering: auto;
      backface-visibility: hidden;
      will-change: transform;
      transition: transform 2.4s cubic-bezier(.2,.8,.2,1), filter 1s ease;
      z-index: 1;
    }

    .screen.active .bg-image {
      transform: scale(1);
      filter: contrast(1.06) saturate(1.08) brightness(1.03);
    }

    .fallback-envelope-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 35%, rgba(255, 232, 154, 0.35), transparent 22%),
        radial-gradient(circle at 50% 44%, rgba(255, 211, 104, 0.22), transparent 34%),
        linear-gradient(135deg, #c59a78 0%, #e2b07c 32%, #9b6b4f 70%, #4d342a 100%);
    }

    .cinematic-grade {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 42%, transparent 0%, rgba(0,0,0,0.04) 38%, rgba(0,0,0,0.42) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.06), transparent 28%, rgba(0,0,0,0.42));
    }

    .gold-bloom {
      position: absolute;
      inset: -20%;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 38%, rgba(255, 224, 133, 0.48), transparent 18%),
        radial-gradient(circle at 50% 56%, rgba(255, 192, 67, 0.18), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(255, 247, 202, 0.14), transparent 22%);
      filter: blur(18px);
      animation: bloomDrift 9s ease-in-out infinite alternate;
      mix-blend-mode: screen;
    }

    @keyframes bloomDrift {
      from { transform: translate3d(-1%, -1%, 0) scale(1); opacity: 0.72; }
      to { transform: translate3d(1%, 1.5%, 0) scale(1.04); opacity: 1; }
    }

    .film-noise {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.07;
      mix-blend-mode: soft-light;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.8'/%3E%3C/svg%3E");
    }

    .particles {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 232, 151, 0.95);
      box-shadow: 0 0 14px rgba(255, 220, 124, 0.9);
      animation: particleRise linear infinite;
    }

    @keyframes particleRise {
      from { transform: translateY(105vh) scale(0.5); opacity: 0; }
      18% { opacity: 1; }
      82% { opacity: 1; }
      to { transform: translateY(-12vh) scale(1.1); opacity: 0; }
    }

    .envelope-click-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      cursor: pointer;
      border: 0;
      background: transparent;
      padding: 0;
    }

    .envelope-pulse {
      position: absolute;
      left: 50%;
      top: 43%;
      transform: translate(-50%, -50%);
      z-index: 7;
      width: min(34vw, 280px);
      height: min(22vw, 190px);
      border-radius: 32px;
      background: radial-gradient(ellipse, rgba(255, 233, 162, 0.24), rgba(255, 217, 111, 0.08) 42%, transparent 72%);
      border: 1px solid rgba(255, 231, 162, 0.18);
      box-shadow: 0 0 62px rgba(255, 217, 111, 0.24);
      animation: envelopePulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    .click-text {
      position: absolute;
      left: 50%;
      bottom: 11vh;
      transform: translateX(-50%);
      z-index: 9;
      padding: 11px 20px;
      border-radius: 999px;
      color: #fff4c1;
      background: rgba(47, 24, 4, 0.48);
      border: 1px solid rgba(255, 225, 143, 0.34);
      backdrop-filter: blur(10px);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      box-shadow: 0 18px 44px rgba(0,0,0,0.28);
      animation: textFloat 1.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes textFloat {
      0%,100% { transform: translateX(-50%) translateY(0); opacity: 0.78; }
      50% { transform: translateX(-50%) translateY(-7px); opacity: 1; }
    }

    @keyframes envelopePulse {
      0%,100% { opacity: 0.62; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    }

    .trail-overlay {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
      background:
        radial-gradient(circle at 31% 75%, rgba(255,255,255,0.5) 0 2px, transparent 3px),
        radial-gradient(circle at 36% 70%, rgba(255,231,154,0.68) 0 2px, transparent 3px),
        radial-gradient(circle at 42% 65%, rgba(255,240,188,0.75) 0 2px, transparent 3px),
        radial-gradient(circle at 48% 60%, rgba(255,231,154,0.8) 0 2px, transparent 3px),
        radial-gradient(circle at 54% 55%, rgba(255,255,255,0.55) 0 2px, transparent 3px);
      filter: drop-shadow(0 0 10px rgba(255,225,142,0.84));
      opacity: 0.75;
      animation: trailGlow 2.2s ease-in-out infinite;
    }

    @keyframes trailGlow {
      0%,100% { opacity: 0.46; filter: drop-shadow(0 0 7px rgba(255,225,142,0.55)); }
      50% { opacity: 0.95; filter: drop-shadow(0 0 18px rgba(255,225,142,0.95)); }
    }

    .envelope-scene.opening .bg-image,
    .envelope-scene.opening .fallback-envelope-bg {
      transform: scale(1.13);
      filter: brightness(1.16) saturate(1.12);
      transition: transform 1.1s ease, filter 1.1s ease;
    }

    .envelope-scene.opening .envelope-pulse,
    .envelope-scene.opening .envelope-click-layer {
      opacity: 0;
      transition: opacity 0.45s ease;
    }

    .white-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,244,201,0.94), rgba(255,212,105,0.38), transparent 68%);
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }

    .envelope-scene.opening .white-flash {
      animation: flashOpen 1s ease forwards;
    }

    @keyframes flashOpen {
      0% { opacity: 0; transform: scale(0.65); }
      42% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.25); }
    }

    .sheet-screen {
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 226, 147, 0.30), transparent 34%),
        linear-gradient(135deg, #060301, #1a0d04 52%, #050201);
      overflow-y: auto;
      display: grid;
      place-items: center;
      padding: 28px 14px;
    }

    .vintage-sheet {
      position: relative;
      z-index: 8;
      width: min(96vw, 980px);
      padding: clamp(10px, 2.4vw, 22px);
      border-radius: 0;
      color: var(--ink);
      background: transparent;
      border: 0;
      box-shadow: none;
      animation: sheetReveal 1s cubic-bezier(.2,.9,.2,1) both;
      overflow: visible;
    }

    @keyframes sheetReveal {
      from { opacity: 0; transform: translateY(52px) scale(0.94) rotateX(8deg); }
      to { opacity: 1; transform: translateY(0) scale(1) rotateX(0); }
    }

    .vintage-sheet::before {
      content: none;
    }

    .vintage-sheet::after {
      content: none;
    }

    .sheet-glow {
      position: absolute;
      left: 50%;
      top: -18px;
      width: 72%;
      height: 150px;
      transform: translateX(-50%);
      background: radial-gradient(ellipse, rgba(255,255,255,0.34), transparent 68%);
      filter: blur(14px);
      z-index: 1;
      pointer-events: none;
    }

    .scratch-here-text {
      position: relative;
      z-index: 3;
      text-align: center;
      margin: 0 0 12px;
      color: #fff4c1;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      text-shadow: 0 8px 24px rgba(0,0,0,0.62);
    }

    .card-frame {
      position: relative;
      z-index: 2;
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .scratch-card {
      position: relative;
      width: 100%;
      height: min(78vh, 720px);
      aspect-ratio: auto;
      border-radius: 0;
      overflow: hidden;
      background: transparent;
      touch-action: none;
      transform: scale(1);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .scratch-card.scratching {
      transform: scale(1.01);
      box-shadow: 0 0 52px rgba(123, 75, 7, 0.36);
    }

    .scratch-card.revealed {
      animation: revealPop 0.75s ease forwards;
    }

    @keyframes revealPop {
      0% { transform: scale(1.012); }
      45% { transform: scale(1.035) rotate(-0.25deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .reward-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: transparent;
      user-select: none;
      pointer-events: none;
      transform: scale(1);
      transition: transform 1s ease, filter 1s ease;
      filter: saturate(1.08) contrast(1.04);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
      transition: opacity 0.75s ease;
    }

    canvas.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .scratch-glow {
      position: absolute;
      width: 132px;
      height: 132px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 234, 168, 0.38), rgba(255, 207, 92, 0.13) 34%, transparent 68%);
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
      mix-blend-mode: screen;
    }

    .scratch-card.scratching .scratch-glow { opacity: 1; }

    .shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 0%, transparent 30%, rgba(255,255,255,0.34) 43%, rgba(255,226,143,0.34) 50%, transparent 62%, transparent 100%);
      transform: translateX(-120%);
      pointer-events: none;
      animation: shineMove 2.3s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes shineMove {
      0% { transform: translateX(-120%); }
      58%, 100% { transform: translateX(120%); }
    }

    .confetti-piece {
      position: fixed;
      top: -20px;
      width: 9px;
      height: 14px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 999;
      animation: confettiFall 2.8s ease-out forwards;
    }

    .spark-piece {
      position: fixed;
      top: -24px;
      width: 5px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(to bottom, #fff8cf, #ffca56, transparent);
      box-shadow: 0 0 16px rgba(255, 213, 94, 0.9);
      pointer-events: none;
      z-index: 998;
      animation: sparkDrop 1.7s ease-in forwards;
    }

    @keyframes sparkDrop {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(105vh) rotate(180deg); opacity: 0; }
    }

    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 700px) {
      .envelope-pulse {
        width: 220px;
        height: 150px;
      }

      .vintage-sheet {
        width: 98vw;
        padding: 8px;
        border-radius: 0;
      }

      .card-frame {
        padding: 8px;
        border-radius: 25px;
      }

      .scratch-card {
        border-radius: 19px;
      }
    }
  </style></head>
<body>
  <main class="page">
    <div class="film-noise"></div><section class="screen envelope-scene active" id="envelopeScreen">
  <div class="fallback-envelope-bg"></div>
  <img class="bg-image" src="envelope-bg.jpg" alt="" onerror="this.style.display='none'" />
  <div class="cinematic-grade"></div>
  <div class="gold-bloom"></div>
  <div class="trail-overlay"></div>
  <div class="particles" id="envelopeParticles"></div>
  <div class="envelope-pulse"></div>
  <div class="click-text">Click to open</div>
  <button class="envelope-click-layer" id="envelopeWrap" aria-label="Open envelope"></button>
  <div class="white-flash"></div>
</section>

<section class="screen sheet-screen" id="sheetScreen">
  <div class="particles" id="sheetParticles"></div>
  <div class="vintage-sheet">
    <div class="sheet-glow"></div>
    <div class="scratch-here-text">Scratch here</div>
    <div class="card-frame">
      <section class="scratch-card" id="scratchCard">
        <img class="reward-image" src="reward.png" alt="" />
        <canvas id="scratchCanvas"></canvas>
        <div class="scratch-glow" id="scratchGlow"></div>
        <div class="shine" id="shine"></div>
      </section>
    </div>
  </div>
</section>

  </main>  <script>
    const envelopeScreen = document.getElementById('envelopeScreen');
    const sheetScreen = document.getElementById('sheetScreen');
    const envelopeWrap = document.getElementById('envelopeWrap');

    const card = document.getElementById('scratchCard');
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const shine = document.getElementById('shine');
    const scratchGlow = document.getElementById('scratchGlow');

    let isDrawing = false;
    let scratchedOnce = false;
    let lastPoint = null;
    let revealStarted = false;
    let strokeDistance = 0;
    let completedStrokes = 0;

    function showScreen(screen) {
      [envelopeScreen, sheetScreen].forEach(item => item.classList.remove('active'));
      screen.classList.add('active');
    }

    function createParticles(containerId, count) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const particle = document.createElement('span');
        particle.className = 'particle';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.animationDuration = `${5 + Math.random() * 7}s`;
        particle.style.animationDelay = `${Math.random() * 6}s`;
        particle.style.opacity = `${0.35 + Math.random() * 0.65}`;
        particle.style.transform = `scale(${0.45 + Math.random() * 1.1})`;
        container.appendChild(particle);
      }
    }

    createParticles('envelopeParticles', 48);
    createParticles('sheetParticles', 34);

    envelopeWrap.addEventListener('click', () => {
      envelopeScreen.classList.add('opening');
      setTimeout(() => {
        showScreen(sheetScreen);
        setTimeout(setupCanvas, 160);
      }, 850);
    });

    function setupCanvas() {
      const rect = card.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      drawScratchLayer(rect.width, rect.height);
    }

    function drawScratchLayer(width, height) {
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, '#fff8c9');
      gradient.addColorStop(0.16, '#9b5d0d');
      gradient.addColorStop(0.34, '#d69a2e');
      gradient.addColorStop(0.52, '#fff1a8');
      gradient.addColorStop(0.7, '#8c4f08');
      gradient.addColorStop(1, '#f6c95b');

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      const radial = ctx.createRadialGradient(width * 0.5, height * 0.34, 10, width * 0.5, height * 0.5, width * 0.75);
      radial.addColorStop(0, 'rgba(255,255,255,0.26)');
      radial.addColorStop(0.48, 'rgba(255,255,255,0.04)');
      radial.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = radial;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
      for (let i = 0; i < 260; i++) {
        ctx.beginPath();
        ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.18)';
      ctx.lineWidth = 1;
      for (let i = -height; i < width; i += 24) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i + height, height);
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(46, 23, 3, 0.58)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${Math.max(34, width * 0.075)}px Arial Black, Arial, sans-serif`;
      ctx.fillText('SCRATCH ME', width / 2, height / 2);
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
      };
    }

    function eraseCircle(x, y) {
      const brushSize = Math.max(46, canvas.offsetWidth * 0.095);

      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, brushSize, 0, Math.PI * 2);
      ctx.fill();

      scratchGlow.style.left = `${x}px`;
      scratchGlow.style.top = `${y}px`;
    }

    function eraseSmoothLine(from, to) {
      const distance = Math.hypot(to.x - from.x, to.y - from.y);
      const steps = Math.max(1, Math.ceil(distance / 8));

      for (let i = 0; i <= steps; i++) {
        const x = from.x + ((to.x - from.x) * i) / steps;
        const y = from.y + ((to.y - from.y) * i) / steps;
        eraseCircle(x, y);
      }
    }

    function scratch(event) {
      if (!isDrawing || revealStarted) return;

      const point = getPointerPosition(event);

      if (lastPoint) {
        const moveDistance = Math.hypot(point.x - lastPoint.x, point.y - lastPoint.y);
        strokeDistance += moveDistance;
        eraseSmoothLine(lastPoint, point);
      } else {
        eraseCircle(point.x, point.y);
      }

      lastPoint = point;

      if (!scratchedOnce) {
        scratchedOnce = true;
        shine.style.display = 'none';
      }
    }

    function createSparks() {
      for (let i = 0; i < 46; i++) {
        const spark = document.createElement('div');
        spark.className = 'spark-piece';
        spark.style.left = `${Math.random() * 100}vw`;
        spark.style.animationDelay = `${Math.random() * 0.45}s`;
        spark.style.height = `${10 + Math.random() * 22}px`;
        spark.style.opacity = `${0.55 + Math.random() * 0.45}`;
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 2400);
      }
    }

    function createConfetti() {
      const colors = ['#ffcf6b', '#ffffff', '#ffe8a3', '#b87918', '#fff7cf'];

      for (let i = 0; i < 110; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 0.75}s`;
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3800);
      }
    }

    function autoReveal() {
      if (revealStarted) return;

      revealStarted = true;
      canvas.classList.add('fade-out');
      card.classList.add('revealed');
      createConfetti();

      setTimeout(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 520);
    }

    canvas.addEventListener('pointerdown', (event) => {
      isDrawing = true;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.add('scratching');
      canvas.setPointerCapture(event.pointerId);
      scratch(event);
    });

    canvas.addEventListener('pointermove', scratch);

    canvas.addEventListener('pointerup', () => {
      if (strokeDistance > canvas.offsetWidth * 0.22) {
        completedStrokes++;
        createSparks();
      }
      if (completedStrokes >= 6) autoReveal();
      isDrawing = false;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.remove('scratching');
    });

    canvas.addEventListener('pointercancel', () => {
      isDrawing = false;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.remove('scratching');
    });

    window.addEventListener('resize', () => {
      if (!revealStarted && sheetScreen.classList.contains('active')) setupCanvas();
    });
  </script></body>
</html>
