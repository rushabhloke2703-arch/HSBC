<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratch & Reveal</title>  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #242424, #050505 70%);
      overflow: hidden;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .scratch-card {
      position: relative;
      width: min(92vw, 520px);
      aspect-ratio: 4 / 5;
      border-radius: 30px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 35px 100px rgba(0, 0, 0, 0.65);
      touch-action: none;
      transform: scale(1);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .scratch-card.scratching {
      transform: scale(1.015);
      box-shadow: 0 40px 120px rgba(255, 255, 255, 0.16);
    }

    .scratch-card.revealed {
      animation: revealPop 0.65s ease forwards;
    }

    @keyframes revealPop {
      0% {
        transform: scale(1.015);
      }
      45% {
        transform: scale(1.045);
      }
      100% {
        transform: scale(1);
      }
    }

    .reward-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
      transform: scale(1.03);
      transition: transform 0.9s ease;
    }

    .scratch-card.revealed .reward-image {
      transform: scale(1);
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
      touch-action: none;
      transition: opacity 0.65s ease;
    }

    canvas.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      color: white;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      padding: 11px 18px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.2px;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.35s ease;
      animation: floatHint 1.8s ease-in-out infinite;
    }

    @keyframes floatHint {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-5px);
      }
    }

    .hint.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(10px);
    }

    .shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        115deg,
        transparent 0%,
        transparent 34%,
        rgba(255, 255, 255, 0.24) 46%,
        transparent 58%,
        transparent 100%
      );
      transform: translateX(-120%);
      pointer-events: none;
      animation: shineMove 2.4s ease-in-out infinite;
      mix-blend-mode: screen;
    }

    @keyframes shineMove {
      0% {
        transform: translateX(-120%);
      }
      55%, 100% {
        transform: translateX(120%);
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 14px;
      }

      .scratch-card {
        width: 100%;
        max-height: 92vh;
      }
    }
  </style></head>
<body>
  <main class="page">
    <section class="scratch-card" id="scratchCard">
      <!-- Replace reward.png with your actual PNG image file name or image URL -->
      <img class="reward-image" src="reward.png" alt="Scratch card reward" />
      <canvas id="scratchCanvas"></canvas>
      <div class="shine" id="shine"></div>
      <div class="hint" id="hint">Scratch to reveal</div>
    </section>
  </main>  <script>
    const card = document.getElementById('scratchCard');
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    const shine = document.getElementById('shine');

    let isDrawing = false;
    let scratchedOnce = false;
    let lastPoint = null;
    let revealStarted = false;
    let scratchCount = 0;
    let strokeDistance = 0;
    let completedStrokes = 0;

    function setupCanvas() {
      const rect = card.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      canvas.style.width = `${rect.width}px`;
      canvas.style.height = `${rect.height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      drawScratchLayer(rect.width, rect.height);
    }

    function drawScratchLayer(width, height) {
      const gradient = ctx.createLinearGradient(0, 0, width, height);
      gradient.addColorStop(0, '#eeeeee');
      gradient.addColorStop(0.32, '#a8a8a8');
      gradient.addColorStop(0.62, '#d7d7d7');
      gradient.addColorStop(1, '#7d7d7d');

      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.fillStyle = 'rgba(255, 255, 255, 0.26)';
      for (let i = 0; i < 180; i++) {
        ctx.beginPath();
        ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 2.2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
      ctx.font = '800 30px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('SCRATCH HERE', width / 2, height / 2);

      ctx.font = '500 15px Arial';
      ctx.fillText('Swipe fast to reveal', width / 2, height / 2 + 42);
    }

    function getPointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: event.clientX - rect.left,
        y: event.clientY - rect.top,
      };
    }

    function eraseCircle(x, y) {
      const brushSize = Math.max(46, canvas.offsetWidth * 0.095);

      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, brushSize, 0, Math.PI * 2);
      ctx.fill();
    }

    function eraseSmoothLine(from, to) {
      const distance = Math.hypot(to.x - from.x, to.y - from.y);
      const steps = Math.max(1, Math.ceil(distance / 10));

      for (let i = 0; i <= steps; i++) {
        const x = from.x + ((to.x - from.x) * i) / steps;
        const y = from.y + ((to.y - from.y) * i) / steps;
        eraseCircle(x, y);
      }
    }

    function scratch(event) {
      if (!isDrawing || revealStarted) return;

      const point = getPointerPosition(event);

      if (lastPoint) {
        const moveDistance = Math.hypot(point.x - lastPoint.x, point.y - lastPoint.y);
        strokeDistance += moveDistance;
        eraseSmoothLine(lastPoint, point);
      } else {
        eraseCircle(point.x, point.y);
      }

      lastPoint = point;

      if (!scratchedOnce) {
        scratchedOnce = true;
        hint.classList.add('hidden');
        shine.style.display = 'none';
      }
    }

    function autoReveal() {
      if (revealStarted) return;

      revealStarted = true;
      canvas.classList.add('fade-out');
      card.classList.add('revealed');
      hint.classList.add('hidden');

      setTimeout(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 450);
    }

    canvas.addEventListener('pointerdown', (event) => {
      isDrawing = true;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.add('scratching');
      canvas.setPointerCapture(event.pointerId);
      scratch(event);
    });

    canvas.addEventListener('pointermove', scratch);

    canvas.addEventListener('pointerup', () => {
      if (strokeDistance > canvas.offsetWidth * 0.22) {
        completedStrokes++;
      }

      if (completedStrokes >= 6) {
        autoReveal();
      }

      isDrawing = false;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.remove('scratching');
    });

    canvas.addEventListener('pointercancel', () => {
      isDrawing = false;
      lastPoint = null;
      strokeDistance = 0;
      card.classList.remove('scratching');
    });

    window.addEventListener('resize', () => {
      if (!revealStarted) setupCanvas();
    });

    setupCanvas();
  </script></body>
</html>
